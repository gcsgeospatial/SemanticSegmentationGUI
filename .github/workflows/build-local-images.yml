name: build-local-images

# Build the per-backbone Docker images on GitHub's CPU runners (no GPU needed —
# the CUDA torch/spconv are prebuilt pip wheels, the KPConv/RandLA C++ ops are
# CPU compiles, and pykeops compiles CUDA at RUNTIME, not build) and push them to
# GHCR. Other machines then `docker pull ghcr.io/<owner>/trainer-local-<key>`
# (set TT_REGISTRY=ghcr.io/<owner>) instead of building anything.
#
# Commit pins live inside each docker/<key>.Dockerfile (generated by
# tools/gen_dockerfiles.py — re-run it to bump an upstream SHA).

on:
  workflow_dispatch:        # manual only — run it from the Actions tab

permissions:
  contents: read
  packages: write           # lets GITHUB_TOKEN push to GHCR (no PAT needed)

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false      # one backbone failing shouldn't cancel the others
      matrix:
        key: [ptv3, ptv3_hag, randlanet, randlanet_hag,
              kpconvx_cold, kpconvx_cold_hag, kpconv, kpconv_hag]
    steps:
      - name: Checkout this repo (Dockerfiles)
        uses: actions/checkout@v4

      - name: Reclaim disk space (CUDA images are multi-GB)
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /usr/local/share/boost /opt/hostedtoolcache
          df -h /

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.key }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ matrix.key }}.Dockerfile
          tags: ghcr.io/${{ github.repository_owner }}/trainer-local-${{ matrix.key }}:latest
          push: true
          provenance: false
