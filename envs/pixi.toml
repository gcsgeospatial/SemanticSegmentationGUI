# Per-architecture training environments (linux-64/CUDA only) — replaces docker/.
#
# One [feature.<key>] + one [environments] entry per backbone; environment names
# equal Backbone.key so the GUI maps `pixi run -e <key>` with no lookup table.
# Deps mirror each scripts/modal/modal_train_<key>.py recipe (the Modal source of
# truth); tools/check_env_sync.py enforces the mirror.
#
# This is a SEPARATE workspace from the root pixi.toml on purpose: pixi locks all
# environments of a workspace together, and the win-64 GUI solve must not drag in
# seven linux-64 CUDA stacks.
#
# Model sources come from trainer-src-* conda packages (conda-recipes/), which
# install to $PREFIX/opt/<pkg> and export <PKG>_SRC on activation, published on
# the public prefix.dev channel below (live since 2026-07-20) — see
# conda-recipes/README.md for rebuild/upload steps.

[workspace]
name = "trainer-envs"
channels = [
    "conda-forge",
    "https://repo.prefix.dev/gcsgeospatial",
]
# Named cuda variants: each feature binds to the entry matching its wheel stack.
# Plain linux-64/win-64 exist ONLY for the pkg tooling env.
platforms = [
    "linux-64", "win-64",
    { name = "linux-64-cuda118", platform = "linux-64", cuda = "11.8" },
    { name = "linux-64-cuda121", platform = "linux-64", cuda = "12.1" },
    { name = "linux-64-cuda120", platform = "linux-64", cuda = "12.0" },
]
requires-pixi = ">=0.60"

# ---------------------------------------------------------------- ptv3 --------
# torch 2.1.0 + cu118 REQUIRED: spconv cu124's conv-backward is broken for
# PTv3's 5x5x5 stem (see local_train_ptv3.py).

[feature.ptv3]
platforms = ["linux-64-cuda118"]

[feature.ptv3.dependencies]
python = "3.11.*"
trainer-src-ptv3 = "*"

[feature.ptv3.pypi-options]
# Mirror of the modal recipe's pip call: --index-url cu118 --extra-index-url pypi
index-url = "https://download.pytorch.org/whl/cu118"
extra-index-urls = ["https://pypi.org/simple"]
index-strategy = "unsafe-best-match"   # pip-like: +cuXXX pins only exist on the torch index
find-links = [{ url = "https://data.pyg.org/whl/torch-2.1.0+cu118.html" }]
no-build = true    # wheels only -> lockable from the Windows dev box

[feature.ptv3.pypi-dependencies]
torch = { version = "==2.1.0+cu118" }
torchvision = { version = "==0.16.0+cu118" }
numpy = "<2.0"
scipy = "*"
scikit-learn = "*"
plyfile = "*"
tqdm = "*"
tensorboard = "*"
addict = "*"
einops = "*"
timm = "*"
pandas = "<3"
spconv-cu118 = "*"
torch-scatter = "*"
torch-cluster = "*"

[feature.ptv3.tasks]
sanity = "python -c \"import os, sys, torch, spconv, torch_scatter; sys.path.insert(0, os.path.dirname(os.environ['PTV3_SRC'])); import ptv3; print('ptv3 env ok, torch', torch.__version__)\""

# ---------------------------------------------------------- randlanet ---------
# torch 2.2.2 + cu121; compiled knn/subsampling exts ship in trainer-src-randlanet.

[feature.randlanet]
platforms = ["linux-64-cuda121"]

[feature.randlanet.dependencies]
python = "3.11.*"
trainer-src-randlanet = "*"

[feature.randlanet.pypi-options]
index-url = "https://download.pytorch.org/whl/cu121"
extra-index-urls = ["https://pypi.org/simple"]
index-strategy = "unsafe-best-match"   # pip-like: +cuXXX pins only exist on the torch index
no-build = true

[feature.randlanet.pypi-dependencies]
torch = { version = "==2.2.2+cu121" }
torchvision = { version = "==0.17.2+cu121" }
numpy = "<2.0"
scipy = "*"
scikit-learn = "*"
tqdm = "*"
tensorboard = "*"
pyyaml = "*"
matplotlib = "*"
cython = "*"
pandas = "<3"

[feature.randlanet.tasks]
sanity = "python -c \"import os, sys, torch; sys.path.insert(0, os.environ['RANDLANET_SRC']); from utils.data_process import DataProcessing; print('randlanet env ok, torch', torch.__version__)\""

# ------------------------------------------------------------- kpconv ---------
# torch 2.3.0 + cu121; compiled cpp_wrappers + kernel cache ship in trainer-src-kpconv.

[feature.kpconv]
platforms = ["linux-64-cuda121"]

[feature.kpconv.dependencies]
python = "3.11.*"
trainer-src-kpconv = "*"

[feature.kpconv.activation.env]
MPLBACKEND = "Agg"   # headless matplotlib (kernel_points.py imports it)

[feature.kpconv.pypi-options]
index-url = "https://download.pytorch.org/whl/cu121"
extra-index-urls = ["https://pypi.org/simple"]
index-strategy = "unsafe-best-match"   # pip-like: +cuXXX pins only exist on the torch index
no-build = true

[feature.kpconv.pypi-dependencies]
torch = { version = "==2.3.0+cu121" }
torchvision = { version = "==0.18.0+cu121" }
numpy = "<2.0"
scipy = "*"
scikit-learn = "*"
matplotlib = "*"
tqdm = "*"
tensorboard = "*"
pandas = "<3"

[feature.kpconv.tasks]
sanity = "python -c \"import os, sys, torch; sys.path.insert(0, os.environ['KPCONV_SRC']); import cpp_wrappers.cpp_subsampling.grid_subsampling; print('kpconv env ok, torch', torch.__version__)\""

# ------------------------------------------------------- kpconvx-cold ---------
# torch 2.3.0 + cu121 + pykeops. pykeops JIT-compiles CUDA kernels at runtime,
# so this env carries nvcc + a host C++ compiler (the GPU box needs only the
# NVIDIA driver).

[feature.kpconvx-cold]
platforms = ["linux-64-cuda121"]

[feature.kpconvx-cold.dependencies]
python = "3.11.*"
cuda-nvcc = "12.1.*"
cuda-cudart-dev = "12.1.*"
cuda-nvrtc-dev = "12.1.*"
cuda-version = "12.1.*"
cxx-compiler = "*"
trainer-src-kpconvx = "*"

[feature.kpconvx-cold.pypi-options]
index-url = "https://download.pytorch.org/whl/cu121"
extra-index-urls = ["https://pypi.org/simple"]
index-strategy = "unsafe-best-match"   # pip-like: +cuXXX pins only exist on the torch index
# no-build stays OFF here: pykeops ships only an sdist (pure python; its CUDA
# kernels JIT at runtime), so the solver must be allowed to read sdist metadata.

[feature.kpconvx-cold.pypi-dependencies]
torch = { version = "==2.3.0+cu121" }
torchvision = { version = "==0.18.0+cu121" }
numpy = "<2.0"
scipy = "*"
scikit-learn = "*"
easydict = "*"
h5py = "*"
matplotlib = "*"
timm = "*"
pykeops = "*"
tqdm = "*"
tensorboard = "*"
pandas = "<3"

[feature.kpconvx-cold.tasks]
sanity = "python -c \"import os, sys, torch, pykeops; sys.path.insert(0, os.environ['KPCONVX_SRC']); import cpp_wrappers.cpp_subsampling.grid_subsampling; print('kpconvx env ok, torch', torch.__version__)\""

