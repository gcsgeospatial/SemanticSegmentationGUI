# ------------------------------------------------------------ pkg tooling -----
# Packaging env (both platforms): builds the trainer-src-* source packages and
# trainer-weights-* checkpoint packages with rattler-build, and uploads them.
# TT_PREFIX_CHANNEL overrides the destination channel (default gcsgeospatial).

[feature.pkg]
platforms = ["linux-64", "win-64"]

[feature.pkg.dependencies]
rattler-build = ">=0.40"
python = "3.11.*"

# task cwd defaults to this manifest's dir (envs/), hence the ../ paths
[feature.pkg.tasks]
build-src = "rattler-build build --recipe-dir ../conda-recipes -c conda-forge --output-dir ../conda-recipes/output"
package-weights = "python ../tools/package_weights.py"
upload = "rattler-build upload prefix -c ${TT_PREFIX_CHANNEL:-gcsgeospatial} ../conda-recipes/output/**/*.conda"

[environments]
ptv3 = { features = ["ptv3"], no-default-feature = true }
randlanet = { features = ["randlanet"], no-default-feature = true }
kpconv = { features = ["kpconv"], no-default-feature = true }
kpconvx-cold = { features = ["kpconvx-cold"], no-default-feature = true }
concerto = { features = ["concerto"], no-default-feature = true }
sonata = { features = ["sonata"], no-default-feature = true }
utonia = { features = ["utonia"], no-default-feature = true }
pkg = { features = ["pkg"], no-default-feature = true }
