# KPConv-PyTorch sources + compiled cpp_wrappers, pinned at the same SHA the
# modal recipe clones. linux-64 + win-64 (not noarch): ships cp311 extensions.
# The exts are torch-free plain C++/numpy, so variants key on python only.

context:
  sha: "d19c575d3fa9fcfd5a74845b5b27aac7e50472c7"

package:
  name: trainer-src-kpconv
  version: "1.0.0"   # bump when the sha moves

source:
  git: https://github.com/HuguesTHOMAS/KPConv-PyTorch.git
  rev: ${{ sha }}

build:
  number: 0
  script:
    - if: unix
      then: |
        cd "$SRC_DIR/cpp_wrappers/cpp_subsampling" && $PYTHON setup.py build_ext --inplace
        cd "$SRC_DIR/cpp_wrappers/cpp_neighbors" && $PYTHON setup.py build_ext --inplace
        cd "$SRC_DIR"
        touch cpp_wrappers/__init__.py cpp_wrappers/cpp_subsampling/__init__.py \
              cpp_wrappers/cpp_neighbors/__init__.py
        # pre-bake the kernel-point disposition cache (kernels/dispositions/) so
        # first run doesn't pay the optimization. Fallback if upstream ever makes
        # load_kernels import torch: drop this line, first run caches into the
        # (writable) env prefix instead.
        MPLBACKEND=Agg $PYTHON -c "from kernels.kernel_points import load_kernels; load_kernels(1.0, 15, dimension=3, fixed='center')"
        mkdir -p "$PREFIX/opt/kpconv"
        cp -r "$SRC_DIR"/. "$PREFIX/opt/kpconv/"
        rm -rf "$PREFIX/opt/kpconv/.git"
        mkdir -p "$PREFIX/etc/conda/activate.d"
        printf 'export KPCONV_SRC="${CONDA_PREFIX}/opt/kpconv"\n' > "$PREFIX/etc/conda/activate.d/trainer-src-kpconv.sh"
    - if: win
      then: |
        rem conda-forge's vs2022 activation only detects VS 17.x / v143; on newer
        rem VS (e.g. Build Tools 2026) cl never lands on PATH — self-activate then.
        rem vcvars64 APPENDS to INCLUDE/LIB, so the prefix header paths survive.
        rem Clear the stale VS vars the failed activation left behind — a bogus
        rem VSINSTALLDIR makes VsDevCmd.bat error out.
        set "VSINSTALLDIR="
        set "VCINSTALLDIR="
        set "VisualStudioVersion="
        where cl >nul 2>nul
        if %ERRORLEVEL% neq 0 for /f "usebackq tokens=*" %%i in (`vswhere -products * -latest -property installationPath`) do call "%%i\VC\Auxiliary\Build\vcvars64.bat"
        where cl >nul 2>nul
        if %ERRORLEVEL% neq 0 exit 1
        cd /d "%SRC_DIR%\cpp_wrappers\cpp_subsampling"
        %PYTHON% setup.py build_ext --inplace
        if %ERRORLEVEL% neq 0 exit 1
        cd /d "%SRC_DIR%\cpp_wrappers\cpp_neighbors"
        %PYTHON% setup.py build_ext --inplace
        if %ERRORLEVEL% neq 0 exit 1
        cd /d "%SRC_DIR%"
        type nul > cpp_wrappers\__init__.py
        type nul > cpp_wrappers\cpp_subsampling\__init__.py
        type nul > cpp_wrappers\cpp_neighbors\__init__.py
        rem pre-bake the kernel-point disposition cache (see unix branch note)
        set MPLBACKEND=Agg
        %PYTHON% -c "from kernels.kernel_points import load_kernels; load_kernels(1.0, 15, dimension=3, fixed='center')"
        if %ERRORLEVEL% neq 0 exit 1
        if exist .git rmdir /s /q .git
        mkdir "%PREFIX%\opt\kpconv"
        xcopy /e /q /y "%SRC_DIR%" "%PREFIX%\opt\kpconv\"
        if %ERRORLEVEL% neq 0 exit 1
        rem no activate.d .bat: KPCONV_SRC is set by envs/pixi.toml activation.env

requirements:
  build:
    - ${{ compiler('cxx') }}
  host:
    - python 3.11.*
    - setuptools <60   # cpp_wrappers setup.py uses numpy.distutils; >=60 breaks its compiler API
    - numpy <2
    - matplotlib-base   # kernel_points.py imports it (Agg, headless)
  run:
    - python 3.11.*
  ignore_run_exports:
    from_package:
      - numpy   # the env supplies numpy<2 via pip; don't pin a conda numpy

about:
  repository: https://github.com/HuguesTHOMAS/KPConv-PyTorch
  summary: KPConv-PyTorch sources + compiled cpp_wrappers at ${{ sha }}
  license: MIT
