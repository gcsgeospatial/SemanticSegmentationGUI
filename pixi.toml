[workspace]
name = "trainer-gui"
version = "0.1.0"
description = "Unified training terminal for the Modal point-cloud training scripts."
channels = ["conda-forge"]
platforms = ["win-64", "linux-64"]

# Pinned to 3.11: open3d ships no wheels for Python 3.13 (your base conda), and
# numpy<2 has no 3.13 wheels either. Everything here is local-side only — the
# training itself runs in each script's own Modal image.
[dependencies]
python = "3.11.*"
numpy = "<2"
scipy = "*"             # kNN/cKDTree for density analysis + local normal estimation
pyside6 = "*"           # desktop UI
matplotlib = "*"        # metrics dashboard (trainer_gui/plots.py + pages/plotting_page.py)
python-pdal = "*"       # Pretraining tab: HeightAboveGround (SMRF -> hag_nn), LAZ I/O
pip = "*"

[pypi-dependencies]
modal = "*"
open3d = ">=0.18"       # .pcd reader (trainer_gui/readers.py)
laspy = { version = ">=2.5", extras = ["lazrs"] }
plyfile = ">=1.0"
jakteristics = ">=0.6"  # computed geometric feature channels (dataset.py geo_features)
trainer-gui = { path = ".", editable = true }

[activation.env]
# Don't scatter __pycache__/ dirs across the source tree: Python writes bytecode
# caches whenever it imports a module, so running the GUI/tests via pixi
# would litter them everywhere. This disables that for anything launched in the
# env (negligible import-speed cost for a local app).
PYTHONDONTWRITEBYTECODE = "1"

[tasks]
gui = "trainer-gui"                    # launch the desktop app
test = "python tests/smoke_test.py"    # local pipeline checks (no Modal calls)
